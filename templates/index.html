<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/app.css" />
    <title>Photo Sorter Pro</title>
  </head>
  <body class="bg-dark text-light overflow-hidden">
    <div class="d-flex vh-100">
      <!-- Main Content Area -->
      <main
        class="flex-grow-1 d-flex flex-column align-items-center justify-content-center p-4 position-relative"
      >
        <div
          class="position-absolute top-0 start-0 w-100 mt-3 text-center text-secondary small fw-bold"
        >
          {{ remaining }} images remaining
        </div>

        <div
          class="w-100 h-100 d-flex flex-column align-items-center justify-content-center gap-4"
          style="max-height: calc(100vh - 140px)"
        >
          <!-- Primary Image -->
          <div
            class="card bg-black border-secondary shadow-lg overflow-hidden flex-grow-1 d-flex align-items-center justify-content-center w-100"
          >
            <img
              src="/image/{{ image }}"
              class="img-fluid h-100 object-fit-contain"
              alt="{{ image }}"
            />
          </div>

          <!-- Upcoming Previews -->
          <div
            class="d-flex gap-2 p-2 bg-secondary bg-opacity-10 border border-secondary border-opacity-25 rounded"
          >
            {% for thumb in upcoming %}
            <img
              src="/image/{{ thumb }}"
              class="rounded border border-secondary border-opacity-50 object-fit-cover"
              style="
                width: 80px;
                height: 80px;
                opacity: 0.6;
                cursor: pointer;
                transition: 0.2s;
              "
              onmouseover="
                this.style.opacity = 1;
                this.style.transform = 'scale(1.05)';
              "
              onmouseout="
                this.style.opacity = 0.6;
                this.style.transform = 'scale(1)';
              "
              title="{{ thumb }}"
            />
            {% endfor %}
          </div>
        </div>

        <h3 class="mt-3 text-secondary h6 fw-normal" id="current-image-name">
          {{ image }}
        </h3>
      </main>

      <!-- Sidebar -->
      <aside
        class="sidebar bg-dark border-start border-secondary d-flex flex-column shadow-lg"
        style="width: 420px; min-width: 420px; max-width: 420px; flex-shrink: 0;"
      >
        <div class="p-4 pb-2">
          <h2 class="h5 fw-bold text-info">Sets</h2>
        </div>

        <div class="flex-grow-1 overflow-auto px-4 pb-5 mb-4" id="sets-sidebar">
          <div class="d-flex flex-column gap-3">
            {% for s in sets %}
            <div
              class="card bg-secondary bg-opacity-10 border-secondary border-opacity-50 set-card h-100"
              onclick="assign('{{ s.name }}')"
            >
              {% if s.thumbnail %}
              <img
                src="/set-image/{{ s.name }}/{{ s.thumbnail }}"
                class="card-img-top object-fit-cover"
                style="height: 180px"
              />
              {% else %}
              <div
                class="d-flex align-items-center justify-content-center bg-black bg-opacity-25 border-bottom border-secondary border-opacity-25"
                style="height: 180px"
              >
                <span class="display-6">📁</span>
              </div>
              {% endif %}
              <div class="card-body p-3 text-truncate">
                <h5 class="card-title h6 mb-1">{{ s.name }}</h5>
                <p class="card-text small text-secondary mb-0">
                  {{ s.count }} items
                </p>
              </div>
            </div>
            {% endfor %}
          </div>
        </div>

        <!-- Sticky Footer -->
        <div
          class="p-4 border-top border-secondary bg-dark position-sticky bottom-0"
        >
          <button
            class="btn btn-info w-100 fw-bold py-2 shadow-sm"
            onclick="newSet()"
          >
            <span class="me-1">+</span> Create New Set
          </button>
        </div>
      </aside>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
